name: Render Holi Flat Torus

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    container:
      image: manimcommunity/manim:stable
      options: --user root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Render animation
      run: |
        manim -ql holi_flat_torus.py HoliFlatTorus

    - name: Upload video
      uses: actions/upload-artifact@v4
      with:
        name: holi-flat-torus-video
        path: media/
